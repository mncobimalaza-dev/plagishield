<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — PlagiShield</title>
<style>
  :root {
    --bg: #0a0e0f; --surface: #101517; --surface2: #161c1f; --border: #232b2e;
    --text: #e8ecec; --muted: #8a9498; --accent: #34e0a1; --red: #ff5c5c;
    --radius: 8px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .card {
    width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px; margin: 20px;
  }
  .logo { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 20px; color: var(--accent); margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; color: var(--text); font-size: 14px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%; background: var(--accent); color: #06120d; border: none; border-radius: var(--radius);
    padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { font-size: 13px; margin-top: 12px; min-height: 18px; }
  .msg.err { color: var(--red); }
  .msg.ok { color: var(--accent); }
  a { color: var(--accent); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">PlagiShield</div>
  <div class="sub" id="sub-text">Choose a new password for your account.</div>

  <div id="form-area">
    <div class="field">
      <label for="pw1">New password</label>
      <input type="password" id="pw1" placeholder="Min. 8 characters" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label for="pw2">Confirm new password</label>
      <input type="password" id="pw2" placeholder="Repeat password" autocomplete="new-password"/>
    </div>
    <button id="submit-btn" onclick="doReset()">Reset Password</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get('token') || '';
}

async function doReset() {
  const token = getToken();
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = 'msg';

  if (!token) {
    msg.textContent = 'This link is missing its reset token. Please request a new one from the sign-in page.';
    msg.className = 'msg err';
    return;
  }
  if (pw1.length < 8) {
    msg.textContent = 'Password must be at least 8 characters.';
    msg.className = 'msg err';
    return;
  }
  if (pw1 !== pw2) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg err';
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  try {
    const res = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: pw1 })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not reset password.');

    document.getElementById('form-area').innerHTML =
      '<div class="msg ok" style="font-size:14px">Your password has been reset. <a href="/">Return to sign in</a></div>';
  } catch (err) {
    msg.textContent = err.message || 'Something went wrong.';
    msg.className = 'msg err';
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
}
</script>
</body>
</html>
